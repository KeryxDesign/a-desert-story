<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Mulish:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--bordeaux-ink:#2A1A12;--gold:#C9A24B;--cream:#F4ECD8;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{display:flex;flex-direction:column;height:100vh;height:100svh;background:var(--bordeaux-ink);font-family:"Mulish",system-ui,sans-serif;}
  .topbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:var(--bordeaux-ink);border-bottom:1px solid rgba(201,162,75,.28);padding:9px 14px;min-height:54px;}
  .topbar .back{display:inline-flex;align-items:center;gap:7px;color:var(--cream);text-decoration:none;font-weight:600;font-size:.9rem;opacity:.9;white-space:nowrap;}
  .topbar .back:hover{color:var(--gold);opacity:1;}
  .topbar .brand{font-family:"Cinzel Decorative",serif;font-weight:700;color:var(--gold);font-size:.95rem;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .topbar .dl{display:inline-flex;align-items:center;gap:7px;background:var(--gold);color:var(--bordeaux-ink);font-weight:700;font-size:.85rem;text-decoration:none;padding:8px 15px;border-radius:7px;white-space:nowrap;}
  .topbar .dl:hover{background:#d9b45f;}
  .reader{flex:1 1 auto;border:0;width:100%;display:block;background:#3a1616;}
  @media (max-width:520px){ .topbar .brand{display:none;} }
</style>
</head>
